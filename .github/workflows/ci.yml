name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - dev*
      - v[0-9]+.[0-9]+
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTDOCFLAGS: -D warnings
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10
  TIDY_EXPECTED_MARKDOWN_FILE_COUNT: 4
  TIDY_EXPECTED_RUST_FILE_COUNT: 5
  TIDY_EXPECTED_CLANG_FORMAT_FILE_COUNT: 0
  TIDY_EXPECTED_PRETTIER_FILE_COUNT: 8
  TIDY_EXPECTED_TOML_FILE_COUNT: 9
  TIDY_EXPECTED_SHELL_FILE_COUNT: 6
  TIDY_EXPECTED_DOCKER_FILE_COUNT: 1

defaults:
  run:
    shell: bash --noprofile --norc -CeEuxo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    uses: taiki-e/github-actions/.github/workflows/test.yml@main
    with:
      target: x86_64-unknown-linux-gnu,aarch64-apple-darwin,x86_64-pc-windows-msvc,aarch64-unknown-linux-gnu,x86_64-apple-darwin,x86_64-pc-windows-gnu
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@main
    permissions:
      contents: write # for creating branch for pr
      pull-requests: write # unused (used in `codegen-automerge: true` case)
      security-events: write # for github/codeql-action/*
    secrets:
      PR_TOKEN_APP_PRIVATE_KEY: ${{ secrets.PR_TOKEN_APP_PRIVATE_KEY }}
    with:
      immutable-release: false

  test-tidy:
    strategy:
      fail-fast: false
      matrix:
        include:
          # NB: Sync list with https://github.com/taiki-e/checkout-action/blob/HEAD/.github/workflows/ci.yml
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: ubuntu-slim
          - os: macos-14
          - os: macos-15
          - os: macos-15-intel
          - os: macos-26
          - os: windows-2022
          - os: windows-2022
            bash: msys64
          - os: windows-2022
            bash: cygwin
          - os: windows-2025
          - os: windows-2025
            bash: msys64
          - os: windows-2025
            bash: cygwin
          - os: windows-11-arm
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - run: |
          printf '%s\n' 'C:\msys64\mingw32\bin' >>"${GITHUB_PATH}"
          printf '%s\n' 'C:\msys64\usr\bin' >>"${GITHUB_PATH}"
        if: matrix.bash == 'msys64'
      - run: |
          choco install --no-progress --requirechecksums cygwin
          printf '%s\n' 'C:\tools\cygwin\bin' >>"${GITHUB_PATH}"
          printf '%s\n' 'C:\tools\cygwin\usr\bin' >>"${GITHUB_PATH}"
        if: matrix.bash == 'cygwin'
      - uses: taiki-e/checkout-action@v1
      - run: brew install clang-format
        if: startsWith(matrix.os, 'macos')
      - run: |
          sudo apt-get -o Acquire::Retries=10 -qq update
          sudo apt-get -o Acquire::Retries=10 -o Dpkg::Use-Pty=0 install -y --no-install-recommends clang-format
        if: matrix.os == 'ubuntu-slim'
      - uses: taiki-e/github-actions/install-rust@nightly
      - uses: taiki-e/install-action@v2.75.1
        with:
          tool: shellcheck,shfmt,parse-dockerfile,uv,zizmor
          fallback: none
      # min-release-age and allow-git requires npm 11.10+
      - run: npm --version
      - run: sudo npm install --location=global npm@11.11.0
        if: startsWith(matrix.os, 'ubuntu')
      - run: npm install --location=global npm@11.11.0
        if: (!startsWith(matrix.os, 'ubuntu'))
      - run: tools/ci/tidy-show-deps.sh
      - run: tools/ci/tidy.sh
        # Unsupported NodeJS version (19.9.0); >=20 is required
        if: matrix.os != 'windows-11-arm'
      - run: brew install bash
        if: startsWith(matrix.os, 'macos')
      - run: tools/ci/tidy-show-deps.sh
        if: startsWith(matrix.os, 'macos')
      - run: tools/ci/tidy.sh
        if: startsWith(matrix.os, 'macos')
  test-tidy-container:
    strategy:
      fail-fast: false
      matrix:
        container:
          # NB: Sync list with https://github.com/taiki-e/checkout-action/blob/HEAD/.github/workflows/ci.yml
          # debian 9's python3 is 3.5.3, ubuntu 16.04's python3 is 3.5.2, ubuntu 14.04's python3 is 3.4,
          # we got "SyntaxError: invalid syntax" when using yq with python 3.5.2 and older,
          # and we got "Python 3.6 or later is required" when using yq with python 3.5 and older.
          # - ubuntu:14.04 # glibc 2.19
          # - ubuntu:16.04 # glibc 2.23
          - ubuntu:18.04 # glibc 2.27
          - ubuntu:20.04 # glibc 2.31
          - ubuntu:22.04 # glibc 2.35
          - ubuntu:24.04 # glibc 2.39
          - ubuntu:26.04 # glibc 2.42
          - ubuntu:rolling
          # - debian:9-slim # glibc 2.24
          - debian:10-slim # glibc 2.28
          - debian:11-slim # glibc 2.31
          - debian:12-slim # glibc 2.36
          - debian:13-slim # glibc 2.41
          - debian:testing
          - fedora:latest # glibc 2.39 (as of fedora 40)
          - almalinux:8 # glibc 2.28
          - almalinux:8-minimal # glibc 2.28
          - almalinux:9 # glibc 2.34
          - almalinux:9-minimal # glibc 2.34
          - almalinux:10 # glibc 2.39
          - almalinux:10-minimal # glibc 2.39
          # - centos:6 # glibc 2.12 # rustc/nodejs requires glibc 2.17
          - centos:7 # glibc 2.17
          # - opensuse/leap:latest # glibc 2.38 (as of leap 15.6)
          # - opensuse/tumbleweed:latest # glibc 2.39 (as of 2024-07-19)
          # - archlinux:latest # glibc 2.39 (as of 2024-07-19)
          - alpine:latest # musl 1.2.5 (as of alpine 3.20)
          # - openwrt/rootfs:x86-64-openwrt-24.10 # musl 1.2.5
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container: ${{ matrix.container }}
    steps:
      - name: Install requirements (ubuntu/debian)
        run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          case "${CONTAINER}" in
            debian:9* | debian:10*)
              # In Debian, the old repositories is removed from the main mirrors some time after EoL.
              codename=$(grep -E '^VERSION_CODENAME=' /etc/os-release | cut -d= -f2)
              sed -i /etc/apt/sources.list -e 's/deb.debian.org/archive.debian.org/g' \
                -e 's|security.debian.org|archive.debian.org/|g' \
                -e "/${codename}-updates/d"
              ;;
          esac
          retry apt-get -o Acquire::Retries=10 -qq update
          retry apt-get -o Acquire::Retries=10 -o Dpkg::Use-Pty=0 install -y --no-install-recommends ca-certificates curl xz-utils clang-format python3-venv
          case "${CONTAINER}" in
            # ubuntu 18.04/16.04 and debian 10/9's jq is 1.5, ubuntu 14.04's jq is 1.3
            # jq: error (at <stdin>:44): Invalid path expression near attempt to access element 0 of [0]
            # tools/tidy.sh: error on line 408: jq 'del(.dictionaryDefinitions[] | select(.name == "organization-dictionary" | not))'
            ubuntu:1?.04 | debian:10* | debian:9*)
              retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 -o /usr/local/bin/jq https://github.com/jqlang/jq/releases/download/jq-1.6/jq-linux64
              chmod +x /usr/local/bin/jq
              ;;
          esac
        env:
          CONTAINER: ${{ matrix.container }}
        if: startsWith(matrix.container, 'ubuntu') || startsWith(matrix.container, 'debian')
      - name: Install requirements (fedora/almalinux/centos)
        run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          if type -P dnf >/dev/null; then
            retry dnf install -y clang-tools-extra python3
          elif type -P microdnf >/dev/null; then
            retry microdnf install -y tar xz clang-tools-extra python3
          else
            # In CentOS, the old repositories is removed from the main mirrors just after EoL.
            # https://github.com/rust-lang/rust/pull/126352
            sed -i /etc/yum.repos.d/*.repo -e 's!^mirrorlist!#mirrorlist!' \
              -e 's!^#baseurl=http://mirror.centos.org/!baseurl=https://vault.centos.org/!'
            sed -i 's/enabled=1/enabled=0/' /etc/yum/pluginconf.d/fastestmirror.conf
            retry yum install -y xz clang python3
          fi
        if: startsWith(matrix.container, 'fedora') || startsWith(matrix.container, 'almalinux') || startsWith(matrix.container, 'centos')
      - name: Install requirements (alpine)
        run: apk --no-cache add ca-certificates curl clang-extra-tools npm python3
        shell: sh
        if: startsWith(matrix.container, 'alpine')
      - uses: taiki-e/checkout-action@v1
      - uses: taiki-e/github-actions/install-rust@nightly
      - name: Install Node.js
        run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          mkdir -p -- /node
          node_version=20.20.2
          case "${CONTAINER}" in
            ubuntu:1?.04 | debian:9* | centos:7) url="https://unofficial-builds.nodejs.org/download/release/v${node_version}/node-v${node_version}-linux-x64-glibc-217.tar.xz" ;;
            *) url="https://nodejs.org/dist/v${node_version}/node-v${node_version}-linux-x64.tar.xz" ;;
          esac
          retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 "${url}" | tar xJf - --strip-components 1 -C /node
          printf '/node/bin\n' >>"${GITHUB_PATH}"
        env:
          CONTAINER: ${{ matrix.container }}
        if: (!startsWith(matrix.container, 'alpine'))
      - uses: taiki-e/install-action@v2.75.1
        with:
          tool: shellcheck,shfmt,uv,parse-dockerfile
          fallback: none
      # min-release-age and allow-git requires npm 11.10+
      - run: npm --version
      - run: npm install --location=global npm@11.11.0
      - uses: taiki-e/install-action@v2.75.1
        with:
          tool: zizmor
          fallback: none
        if: (!(startsWith(matrix.container, 'ubuntu:1') || startsWith(matrix.container, 'ubuntu:20') || startsWith(matrix.container, 'debian:10') || startsWith(matrix.container, 'debian:11') || startsWith(matrix.container, 'almalinux:8') || startsWith(matrix.container, 'centos') || startsWith(matrix.container, 'alpine')))
      - run: |
          retry() {
            for i in {1..10}; do
              if "$@"; then
                return 0
              else
                sleep "${i}"
              fi
            done
            "$@"
          }
          retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 "https://github.com/cargo-bins/cargo-quickinstall/releases/download/zizmor-1.18.0/zizmor-1.18.0-x86_64-unknown-linux-musl.tar.gz" | tar xzf - -C "${HOME}/.cargo/bin"
        if: startsWith(matrix.container, 'ubuntu:1') || startsWith(matrix.container, 'ubuntu:20') || startsWith(matrix.container, 'debian:10') || startsWith(matrix.container, 'debian:11') || startsWith(matrix.container, 'almalinux:8') || startsWith(matrix.container, 'centos') || startsWith(matrix.container, 'alpine')
      - run: tools/ci/tidy-show-deps.sh
      - run: tools/ci/tidy.sh
  test-tidy-vm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: freebsd
            version: '14.3'
          - os: freebsd
            version: '15.0'
          # realpath (called in `uvx yq`) requires NetBSD 10: https://man.netbsd.org/realpath.1
          # - os: netbsd
          #   version: '9.4'
          - os: netbsd
            version: '10.1'
          - os: openbsd
            version: '7.8'
          - os: omnios
            version: 'r151056'
          # TODO: hang on "syncing markdown to rustdoc"
          # - os: haiku
          #   version: 'r1beta5'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: taiki-e/github-actions/free-device-space@main
        if: matrix.os == 'netbsd' || matrix.os == 'omnios'
      - uses: taiki-e/cross-platform-actions-action@dev
        with:
          environment_variables: CARGO_INCREMENTAL CARGO_NET_RETRY CARGO_TERM_COLOR RUST_BACKTRACE RUST_TEST_THREADS RUSTDOCFLAGS RUSTFLAGS RUSTUP_MAX_RETRIES TIDY_EXPECTED_MARKDOWN_FILE_COUNT TIDY_EXPECTED_RUST_FILE_COUNT TIDY_EXPECTED_CLANG_FORMAT_FILE_COUNT TIDY_EXPECTED_PRETTIER_FILE_COUNT TIDY_EXPECTED_TOML_FILE_COUNT TIDY_EXPECTED_SHELL_FILE_COUNT TIDY_EXPECTED_DOCKER_FILE_COUNT
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.version }}
          shell: bash
          sync_files: runner-to-vm
          run: |
            set -CeEuxo pipefail
            retry() {
              for i in {1..10}; do
                if "$@"; then
                  return 0
                else
                  sleep "${i}"
                fi
              done
              "$@"
            }
            case "$(uname -s)" in
              FreeBSD)
                # Refs: https://www.freshports.org/
                retry sudo pkg install -y git jq npm python3 devel/uv shfmt hs-ShellCheck llvm
                retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain nightly --no-modify-path
                export PATH="${HOME}/.cargo/bin:${PATH}"
                retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 "https://github.com/taiki-e/parse-dockerfile/releases/latest/download/parse-dockerfile-x86_64-unknown-freebsd.tar.gz" | tar xzf - -C "${HOME}/.cargo/bin"
                cargo install zizmor --debug --locked
                rm -rf -- /tmp/cargo-install* # cargo install artifacts
                # min-release-age and allow-git requires npm 11.10+
                npm --version
                sudo npm install --location=global npm@11.11.0
                ;;
              NetBSD)
                retry sudo pkgin update
                # Refs: https://ftp.netbsd.org/pub/pkgsrc/packages/NetBSD/x86_64/
                # uv from package manager is old
                retry sudo pkgin -y install mozilla-rootcerts-openssl git jq nodejs shfmt shellcheck clang
                sudo pkgin clean
                sudo ln -s -- /usr/pkg/bin/python3.13 /usr/pkg/bin/python3
                sudo ln -s -- /usr/pkg/bin/uv-3.13 /usr/pkg/bin/uv
                sudo ln -s -- /usr/pkg/bin/uvx-3.13 /usr/pkg/bin/uvx
                export PATH="${HOME}/.local/bin:${PATH}"
                retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain nightly --no-modify-path
                export PATH="${HOME}/.cargo/bin:${PATH}"
                cargo install parse-dockerfile --debug
                rm -rf -- /tmp/cargo-install* # cargo install artifacts
                # Failed to install due to jemalloc build error,
                # and "No space left on device" error: https://github.com/cross-platform-actions/action/issues/111
                # cargo install zizmor --debug --locked --git https://github.com/taiki-e/zizmor.git --branch dev
                # rm -rf -- /tmp/cargo-install* # cargo install artifacts
                # min-release-age and allow-git requires npm 11.10+
                npm --version
                sudo npm install --location=global npm@11.11.0
                ;;
              OpenBSD)
                # Refs: https://openbsd.app/?search=
                # OpenBSD targets are tier 3 targets, so install Rust from package manager instead of rustup.
                # uv from package manager is old
                retry sudo pkg_add git jq node shfmt shellcheck rust rust-rustfmt clang-tools-extra
                export PATH="${HOME}/.cargo/bin:${PATH}"
                cargo install parse-dockerfile --debug
                rm -rf -- /tmp/cargo-install* # cargo install artifacts
                # Failed to install due to jemalloc build error,
                # fixed in https://github.com/zizmorcore/zizmor/pull/1812
                cargo install zizmor --debug --locked --git https://github.com/taiki-e/zizmor.git --branch dev
                rm -rf -- /tmp/cargo-install* # cargo install artifacts
                # min-release-age and allow-git requires npm 11.10+
                npm --version
                # Failed due to "npm error Cannot find module 'promise-retry'"
                # sudo npm install --location=global npm@11.11.0
                ;;
              SunOS)
                if [[ "$(/usr/bin/uname -o)" == 'illumos' ]]; then
                  # Refs: https://omnios.org/info/ipsrepos
                  retry sudo pkg install developer/versioning/git gnu-tar jq runtime/node-24 runtime/python-313 developer/clang-21
                  export PATH="${HOME}/.local/bin:${PATH}"
                  retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 -o bootstrap.tar.gz https://pkgsrc.SmartOS.org/packages/SmartOS/bootstrap/bootstrap-2024Q4-x86_64.tar.gz
                  sudo tar xzpf bootstrap.tar.gz -C /
                  export PATH="/opt/local/sbin:/opt/local/bin:${PATH}"
                  # Refs: https://pkgsrc.smartos.org/packages/SmartOS/2024Q4/x86_64/All/
                  retry sudo pkgin -y install shfmt shellcheck
                  retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain nightly --no-modify-path
                  export PATH="${HOME}/.cargo/bin:${PATH}"
                  # Use gtar instead of tar because "tar: directory checksum error" error
                  retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 "https://github.com/taiki-e/parse-dockerfile/releases/latest/download/parse-dockerfile-x86_64-unknown-illumos.tar.gz" | gtar xzf - -C "${HOME}/.cargo/bin"
                  # Failed to install due to jemalloc build error,
                  # and "No space left on device" error: https://github.com/cross-platform-actions/action/issues/111
                  # unset RUSTFLAGS
                  # cargo install uv --debug --locked --git https://github.com/taiki-e/uv.git --branch dev
                  # rm -rf -- /tmp/cargo-install* # cargo install artifacts
                  # Failed to install due to jemalloc build error,
                  # and "No space left on device" error: https://github.com/cross-platform-actions/action/issues/111
                  # cargo install zizmor --debug --locked --git https://github.com/taiki-e/zizmor.git --branch dev
                  rm -rf -- /tmp/cargo-install* # cargo install artifacts
                  # min-release-age and allow-git requires npm 11.10+
                  npm --version
                  sudo npm install --location=global npm@11.11.0
                fi
                ;;
            esac
            tools/ci/tidy-show-deps.sh
            tools/ci/tidy.sh
  test-tidy-vm-dragonfly:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: vmactions/dragonflybsd-vm@323497fa680c1856dd1ba5c4fd89182a9194f649 # v1.2.7
        with:
          envs: CARGO_INCREMENTAL CARGO_NET_RETRY CARGO_TERM_COLOR RUST_BACKTRACE RUST_TEST_THREADS RUSTDOCFLAGS RUSTFLAGS RUSTUP_MAX_RETRIES TIDY_EXPECTED_MARKDOWN_FILE_COUNT TIDY_EXPECTED_RUST_FILE_COUNT TIDY_EXPECTED_CLANG_FORMAT_FILE_COUNT TIDY_EXPECTED_PRETTIER_FILE_COUNT TIDY_EXPECTED_TOML_FILE_COUNT TIDY_EXPECTED_SHELL_FILE_COUNT TIDY_EXPECTED_DOCKER_FILE_COUNT
          usesh: true
          copyback: false
          run: |
            # DragonFly BSD sh's -E means -o emacs
            # shellcheck disable=SC3040
            set -Ceuxo pipefail
            # shellcheck disable=SC3009
            retry() {
              for i in {1..10}; do
                if "$@"; then
                  return 0
                else
                  sleep "${i}"
                fi
              done
              "$@"
            }
            retry pkg upgrade -y # needed to avoid Undefined symbol "uv_library_shutdown" error
            # DragonFly BSD targets are tier 3 targets, so install Rust from package manager instead of rustup.
            # Refs: https://avalon.dragonflybsd.org/dports/dragonfly:6.4:x86:64/LATEST/All/
            retry pkg install -y bash git jq npm-node20 python3 hs-ShellCheck rust llvm
            # go and shfmt not available in 6.4 packages since 2025-03-17.
            go_version=1.24.13 # https://go.dev/dl
            mkdir -p -- "${HOME}/go"
            retry curl --proto '=https' --tlsv1.2 -fsSL --retry 10 "https://go.dev/dl/go${go_version}.dragonfly-amd64.tar.gz" | tar xzf - -C "${HOME}/go"
            export PATH="${HOME}/go/go/bin:${PATH}"
            go version
            export GOPATH="${HOME}/go"
            export PATH="${GOPATH}/bin:${PATH}"
            go install mvdan.cc/sh/v3/cmd/shfmt@v3.11.0
            export PATH="${HOME}/.cargo/bin:${PATH}"
            cargo install parse-dockerfile --debug
            rm -rf -- /tmp/cargo-install* # cargo install artifacts
            # rustc installed from package manager is 1.85, latest uv requires 1.92.
            # Failed to install due to sys-info build error,
            # cargo install uv --debug --locked --git https://github.com/astral-sh/uv.git --rev 4ed9c5791ba9d5c304aae14b920d612af26dc2d3 # 0.7.15
            # rustc installed from package manager is 1.85, latest zizmor requires 1.88 and 1.85 compatible version (1.11.0) doesn't support config that we use.
            # cargo install zizmor --debug --locked
            rm -rf -- /tmp/cargo-install* # cargo install artifacts
            # min-release-age and allow-git requires npm 11.10+
            npm --version
            npm install --location=global npm@11.11.0
            git config --global --add safe.directory "$(pwd)"
            tools/ci/tidy-show-deps.sh
            tools/ci/tidy.sh
  test-tidy-vm-solaris:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: vmactions/solaris-vm@0a231b94365d1911cf62097ef342f6b30d95598f # v1.3.2
        with:
          envs: CARGO_INCREMENTAL CARGO_NET_RETRY CARGO_TERM_COLOR RUST_BACKTRACE RUST_TEST_THREADS RUSTDOCFLAGS RUSTFLAGS RUSTUP_MAX_RETRIES TIDY_EXPECTED_MARKDOWN_FILE_COUNT TIDY_EXPECTED_RUST_FILE_COUNT TIDY_EXPECTED_CLANG_FORMAT_FILE_COUNT TIDY_EXPECTED_PRETTIER_FILE_COUNT TIDY_EXPECTED_TOML_FILE_COUNT TIDY_EXPECTED_SHELL_FILE_COUNT TIDY_EXPECTED_DOCKER_FILE_COUNT
          usesh: true
          copyback: false
          run: |
            # Solaris sh has no -C/-E/-o pipefail
            set -eux
            # shellcheck disable=SC3009
            retry() {
              for i in {1..10}; do
                if "$@"; then
                  return 0
                else
                  sleep "${i}"
                fi
              done
              "$@"
            }
            g() {
              set +x
              ifs="${IFS}"
              IFS=' '
              cmd="$*"
              IFS="${ifs}"
              printf '::group::%s\n' "${cmd#retry }"
              "$@"
              printf '::endgroup::\n'
              set -x
            }
            g ld -z help
            # Refs: http://pkg.oracle.com/solaris/release/en/index.shtml
            g retry pkg install developer/versioning/git jq pkg://solaris/runtime/python-313 runtime/nodejs developer/llvm/clang developer/go
            export GOPATH="${HOME}/go"
            export PATH="${GOPATH}/bin:${PATH}"
            g go install mvdan.cc/sh/v3/cmd/shfmt@v3.11.0
            # TODO: shellcheck
