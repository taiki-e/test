name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - v[0-9]+.*
  # release:
  #   types: [created]

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10

defaults:
  run:
    shell: bash --noprofile --norc -CeEuxo pipefail {0}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  create-release:
    if: github.repository_owner == 'taiki-e'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # for taiki-e/create-gh-release-action
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: taiki-e/create-gh-release-action@main
        id: create-gh-release
        with:
          # prefix: test
          changelog: CHANGELOG.md
          # allow-missing-changelog: true
          # title: $prefix $version
          # branch: 'main|v[0-9]+\.[0-9]+'
          # latest: false
          ref: ${{ github.ref }}
      - run: |
          printf '%s\n' "${OUTPUT_COMPUTED_PREFIX}"
          printf '%s\n' "${OUTPUT_VERSION}"
        env:
          OUTPUT_COMPUTED_PREFIX: ${{ steps.create-gh-release.outputs.computed-prefix }}
          OUTPUT_VERSION: ${{ steps.create-gh-release.outputs.version }}

  upload-assets:
    name: ${{ matrix.target }}
    if: github.repository_owner == 'taiki-e'
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu.2.17
            os: ubuntu-latest
            build-tool: cargo-zigbuild
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: universal-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write # for taiki-e/upload-rust-binary-action
      id-token: write # for actions/attest
      attestations: write # for actions/attest
    steps:
      - uses: taiki-e/checkout-action@v1
      - uses: taiki-e/github-actions/install-rust@stable
      - uses: taiki-e/install-action@v2.75.1
        with:
          tool: cross
          fallback: none
        if: matrix.target == 'aarch64-unknown-linux-gnu'
      - id: upload
        uses: taiki-e/upload-rust-binary-action@main
        with:
          bin: rust-test-bin,a
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          archive: test-$target
          checksum: sha256,sha512,sha1,md5
          tar: all
          zip: all
          include: rust
          # leading-dir: true
          ref: ${{ github.ref }}
          # pgp-public-key: .github/public-key.asc
          # pgp-private-key: ${{ secrets.PGP_PRIVATE_KEY }}
          # pgp-passphrase: ${{ secrets.PGP_PASSPHRASE }}
      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.upload.outputs.archive }}.*
