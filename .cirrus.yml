env:
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  RUST_TEST_THREADS: '1'
  RUSTDOCFLAGS: -D warnings
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: '10'

freebsd_test_task:
  name: test (freebsd)
  auto_cancellation: $CIRRUS_BRANCH != 'main'
  arm_container:
    image: rust:latest
  # setup_script:
  #   - rustup toolchain add nightly --component rust-src && rustup default nightly
  test_script:
    # - unzip i686-unknown-freebsd-ubuntu-18.04.zip && chmod +x ./rust-test1 && ./rust-test1; rm -f ./rust-test1
    # - unzip i686-unknown-freebsd-ubuntu-20.04.zip && chmod +x ./rust-test1 && ./rust-test1; rm -f ./rust-test1
    # - unzip i686-unknown-freebsd-ubuntu-22.04.zip && chmod +x ./rust-test1 && ./rust-test1; rm -f ./rust-test1
    - unzip x86_64-unknown-freebsd-ubuntu-18.04.zip && chmod +x ./rust-test1 && ./rust-test1; rm -f ./rust-test1
    - unzip x86_64-unknown-freebsd-ubuntu-20.04.zip && chmod +x ./rust-test1 && ./rust-test1; rm -f ./rust-test1
    - unzip x86_64-unknown-freebsd-ubuntu-22.04.zip && chmod +x ./rust-test1 && ./rust-test1; rm -f ./rust-test1
